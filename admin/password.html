<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Change Admin Password</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body data-page="password">
  <div class="admin-wrap">
    <aside class="admin-side">
      <h2>IEC Admin</h2>
      <a href="index.html">Dashboard</a>
      <a class="active" href="password.html">Password</a>
      <button type="button" data-logout>Logout</button>
    </aside>
    <main class="admin-main">
      <a class="top-link" href="index.html">← Back to Dashboard</a>
      <h1>Change Password</h1>
      <form id="passwordForm" class="admin-form">
        <p id="passwordMessage" hidden></p>

        <label for="currentPassword">Current Password</label>
        <div class="password-row">
          <input id="currentPassword" type="password" required autocomplete="current-password">
          <button type="button" class="toggle-password" data-target="currentPassword">Show</button>
        </div>

        <label for="newPassword">New Password</label>
        <div class="password-row">
          <input id="newPassword" type="password" required minlength="8" autocomplete="new-password">
          <button type="button" class="toggle-password" data-target="newPassword">Show</button>
        </div>
        <div class="strength"><span></span></div>
        <ul class="rules small">
          <li data-rule="length">At least 8 characters</li>
          <li data-rule="upper">One uppercase letter</li>
          <li data-rule="lower">One lowercase letter</li>
          <li data-rule="number">One number</li>
          <li data-rule="special">One special character</li>
        </ul>

        <label for="confirmPassword">Confirm New Password</label>
        <div class="password-row">
          <input id="confirmPassword" type="password" required minlength="8" autocomplete="new-password">
          <button type="button" class="toggle-password" data-target="confirmPassword">Show</button>
        </div>

        <div class="form-actions">
          <button class="btn primary" type="submit">Change Password</button>
          <span class="small muted">Saved in this browser with localStorage.</span>
        </div>
      </form>
    </main>
  </div>
  <script src="../assets/js/admin.js"></script>
</body>
</html>
